services:
  web:
    build:
      context: .
      dockerfile: .devcontainers/fedora40.Dockerfile
    container_name: vpn_web
    ports:
      - "5000:5000"
    volumes:
      - .:/workspaces/project
    environment:
      - PYTHONPATH=/workspaces/project
      - PYTHONUNBUFFERED=1
    user: root
    working_dir: /workspaces/project
    command: python3 web/app.py
    depends_on:
      - vpn

  vpn:
    build:
      context: .
      dockerfile: .devcontainers/fedora40.Dockerfile
    container_name: vpn_service
    network_mode: host
    volumes:
      - .:/workspaces/project
    environment:
      - PYTHONPATH=/workspaces/project
      - PYTHONUNBUFFERED=1
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    privileged: true
    user: root
    working_dir: /workspaces/project
    command: >
      bash -c "
      mkdir -p /dev/net &&
      mknod -m 666 /dev/net/tun c 10 200 2>/dev/null || true &&
      chmod 666 /dev/net/tun &&
      python3 vpn/vpn_server.py
      "