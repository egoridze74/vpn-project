<!DOCTYPE html>
<html>

<head>
    <title>Вход - СЛОН ВПН</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐘</text></svg>">
</head>

<body>
    <div class="main">
        <h1>СЛОН ВПН 🐘</h1>
        <h3>Введите свои данные</h3>

        {% if error %}
        <div style="color: red; margin-bottom: 15px; padding: 10px; background-color: #ffe6e6; border-radius: 5px;">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="post">
            <label for="username">
                Логин:
            </label>
            <input type="text" id="username" name="username" placeholder="Введите логин" required>

            <label for="password">
                Пароль:
            </label>
            <input type="password" id="password" name="password" 
                placeholder="Введите пароль" required>

            <div class="wrap">
                <button type="submit">
                    Войти
                </button>
            </div>
        </form>
        
        <p>Нет аккаунта? 
            <a href="{{ url_for('register') }}" style="text-decoration: none; color: #4CAF50;">
                Зарегистрироваться
            </a>
        </p>
    </div>
</body>

</html>
